<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chick.io</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="start">
        <h1>Welcome to chick.io!</h1>
        <button id="start-btn">INSERT COIN</button>   
    </div> 

    <div id="setup-screen" style="display:none">
        <div class="setup-box">
            <p class="setup-title">CHOOSE YOUR PET</p>
            <div class="pet-choices" id="petChoices">
                <div class="pet-choice selected" data-pet="egg">
                    <span>🐣</span><span class="choice-label">EGG</span>
                </div>
                <div class="pet-choice" data-pet="cat">
                    <span>🐱</span><span class="choice-label">CAT</span>
                </div>
                <div class="pet-choice" data-pet="dog">
                    <span>🐶</span><span class="choice-label">DOG</span>
                </div>
            </div>
            <p class="setup-title" style="margin-top:24px">YOUR NAME</p>
            <input id="nameInput" class="name-input" type="text" maxlength="8" placeholder="PIXEL" />
            <button id="begin-btn">START!</button>
        </div>
    </div>

    <div class="tama-wrap" id="tama-wrap" style="display:none">
        <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Tamagotchi web app — feed, play and care for your virtual pet</h2>

        <!-- top bar -->
        <div class="stats-bar" id="statsBar">
            <div class="stat">
                <div class="stat-label">HNG</div>
                <div class="stat-track"><div class="stat-fill" id="hungerFill" style="width:80%"></div></div>
            </div>
            <div class="stat">
                <div class="stat-label">HAP</div>
                <div class="stat-track"><div class="stat-fill" id="happyFill" style="width:80%"></div></div>
            </div>
            <div class="stat">
                <div class="stat-label">HLT</div>
                <div class="stat-track"><div class="stat-fill" id="healthFill" style="width:80%"></div></div>
            </div>
            <div class="top-right">
                <span id="weatherIcon">☀️</span>
                <span id="timeLabel">DAY</span>
                <span class="coin-display">🪙<span id="coinCount">0</span></span>
            </div>
        </div>

        <!-- Pet stage center -->
        <div class="pet-stage" id="petStage">
            <div class="pixel-pet" id="petSprite">🐣</div>
            <div class="pet-name" id="petName">PIXEL</div>
            <div class="mood-row">
                <div class="mood-icon" id="moodIcon">😊</div>
                <div class="age-display" id="ageDisplay">AGE 0</div>
                <div class="record-display" id="recordDisplay"></div>
            </div>
            <div class="toast" id="toast"></div>
        </div>

        <!-- bottom bar -->
        <div class="btn-panel">
            <div class="btn-cell" id="btnFeed">
                <span class="pixel-btn-icon">🍖</span>
                <span class="btn-label">FEED</span>
            </div>
            <div class="btn-cell" id="btnPlay">
                <span class="pixel-btn-icon">🎮</span>
                <span class="btn-label">PLAY</span>
            </div>
            <div class="btn-cell" id="btnHeal">
                <span class="pixel-btn-icon">💊</span>
                <span class="btn-label">HEAL</span>
            </div>
            <div class="btn-cell" id="btnShop">
                <span class="pixel-btn-icon">🏪</span>
                <span class="btn-label">SHOP</span>
            </div>
        </div>
    </div>

    <!-- MINIGAME -->
    <div id="minigame" style="display:none">
        <div class="minigame-box">
            <p class="minigame-title" id="mgTitle">ROCK PAPER SCISSORS</p>
            <p class="minigame-sub" id="mgSub">CHOOSE!</p>
            <div class="mg-choices" id="mgChoices">
                <button class="mg-btn" data-val="rock">✊</button>
                <button class="mg-btn" data-val="paper">✋</button>
                <button class="mg-btn" data-val="scissors">✌️</button>
            </div>
            <p class="mg-result" id="mgResult"></p>
            <button id="mgClose" style="display:none">BACK</button>
        </div>
    </div>
 
    <!-- SHOP -->
    <div id="shop" style="display:none">
        <div class="shop-box">
            <p class="shop-title">SHOP <span class="coin-display">🪙<span id="shopCoins">0</span></span></p>
            <div class="shop-items" id="shopItems"></div>
            <button id="shopClose">CLOSE</button>
        </div>
    </div>
 
    <script src="script.js"></script>
</body>
</html>
